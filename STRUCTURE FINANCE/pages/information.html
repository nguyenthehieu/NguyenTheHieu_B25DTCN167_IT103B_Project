            <label for="email">Email <span>*</span></label>

            <input type="text" placeholder="Nguyen Van A" required>
            <input type="email" name="" id="" placeholder="nguyenvana@gmail.com" required>
            
            <label for="phone">Phone <span>*</span></label>
            <label for="gender">Gender <span>*</span></label>
            
            <input type="tel" placeholder="xxxxxxxxxx" required>
            <input type="text" placeholder="Male/Female" required>
            
            <button>Change Information</button>
            <button>Change Password</button>
        </form>
