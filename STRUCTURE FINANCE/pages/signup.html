<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/signup.css">
</head>

<body>
    <div class="register-box">
        <h3> Sign Up</h3>

       <input type="email" id="email" placeholder="Email here...">
<small class="error" id="emailError"></small>

<input type="password" id="password" placeholder="Password here...">
<small class="error" id="passwordError"></small>

<input type="password" id="confirmPassword" placeholder="Confirm password here...">
<small class="error" id="confirmError"></small>

        <div class="register">
            <button>Sign Up</button>
            <p>You have account? <a href="./signin.html">Sign in</a></p>
        </div>
    </div>

    <script src="../js/signup.js"></script>
</body>

</html>
