<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <div class="register-box">
        <h3> Đăng ký tài khoản</h3>

        <input type="email" id="email" placeholder="Email here..." required>
        <input type="password" placeholder="Password here..." required>
        <input type="password" placeholder="Confirm password here..." required>

        <div class="register">
            <button>Sign Up</button>
            <p>You have account? <a href="./login.html">Sign in</a></p>
        </div>

    </div>
</body>

</html>
