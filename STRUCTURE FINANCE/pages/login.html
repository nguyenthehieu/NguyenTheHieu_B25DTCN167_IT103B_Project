<!DOCTYPE html>
<html lang="vi">
<head>

    <title>Login</title>

    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="login-box">
    <h3><i class="bi bi-lock"></i> Sign In</h3>

    </div>

</div>

</body>
</html>
